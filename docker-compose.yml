services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=gerador_atas
      - TZ=America/Fortaleza
    container_name: gerador-atas-db
    ports:
      - '5432:5432'
    volumes:
      - ./volumes/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
  api:
      build: .
      network_mode: host
      environment:
        - DB_HOST=localhost
        - DB_PORT=5432
        - DB_USER=postgres
        - DB_PASSWORD=postgres
        - DB_NAME=gerador_atas
      env_file:
        - .env.docker
      depends_on:
        postgres:
          condition: service_healthy
